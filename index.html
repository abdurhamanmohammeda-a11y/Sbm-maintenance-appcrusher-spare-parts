
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBM Smart Maintenance AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root{ --primary:#FFA500; --bg:#0f1117; --card:#1c1f26; --text:#e6edf3; --accent:#39FF14; --danger:#ff4444; }
        body{ margin:0; background:var(--bg); color:var(--text); font-family:'Roboto',sans-serif; }
        header{ text-align:center; padding:20px; background:linear-gradient(180deg,#FFA500,#111); border-radius:0 0 20px 20px; }
        header h1{ margin:0; font-family:'Orbitron',sans-serif; font-size:22px; color: #000; }
        .container{ max-width:800px; margin:auto; padding:15px; }
        .card{ background:var(--card); padding:20px; border-radius:15px; margin:15px 0; border:1px solid #30363d; }
        input,select,textarea,button{ width:100%; padding:14px; margin:10px 0; border-radius:10px; border:none; background: #0d1117; color: white; }
        button{ background:var(--primary); color:#000; font-weight:bold; cursor:pointer; }
        #mainApp { display: none; }
    </style>
</head>
<body>

<header>
    <h1>ABDURHAMAN MECHATRONICS</h1>
    <p>AI Maintenance System</p>
</header>

<div class="container">
    <div id="loginSection" class="card">
        <h2>🔐 Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">SIGN IN</button>
    </div>

    <div id="mainApp">
        <div class="card">
            <h2>📸 AI Machine Scanner</h2>
            <input type="file" id="imgFile" accept="image/*">
            <button onclick="runVisionAI()">ANALYZE WITH AI</button>
            <textarea id="issue" placeholder="Analysis result..."></textarea>
            <button onclick="saveReport()">SAVE REPORT</button>
        </div>
        <div class="card">
            <h2>📈 Live Dashboard</h2>
            <div id="reportList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script type="module">
    import { analyzeImage } from './api/vision-ai.js';
    window.runVisionAI = async () => {
        const file = document.getElementById("imgFile").files[0];
        if(!file) return alert("Select Image!");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            document.getElementById("issue").value = "Analyzing...";
            try {
                const data = await analyzeImage(reader.result);
                document.getElementById("issue").value = data.choices[0].message.content;
            } catch (err) { alert("AI Error: Check API Key in vision-ai.js"); }
        };
    };
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1_0Ptpna4V-2cfyJHNwIvWvbA2eGLv18",
  authDomain: "sbm-app-ecf59.firebaseapp.com",
  projectId: "sbm-app-ecf59",
  storageBucket: "sbm-app-ecf59.firebasestorage.app",
  messagingSenderId: "666387083873",
  appId: "1:666387083873:web:bfd6d5e064ecaad6c73020"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function login() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(e, p);
}
auth.onAuthStateChanged(user => {
    document.getElementById("loginSection").style.display = user ? "none" : "block";
    document.getElementById("mainApp").style.display = user ? "block" : "none";
});

function saveReport(){
    const i = document.getElementById("issue").value;
    db.collection("reports").add({ issue: i, time: firebase.firestore.FieldValue.serverTimestamp() });
}

db.collection("reports").orderBy("time", "desc").onSnapshot(snap => {
    const list = document.getElementById("reportList");
    list.innerHTML = "";
    snap.forEach(doc => {
        list.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px;">${doc.data().issue}</div>`;
    });
});
</script>
</body>
</html>
