<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBM Smart AI - Full Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard/dashboard.css">
    <style>
        :root{ --primary:#FFA500; --bg:#0f1117; --card:#1c1f26; --text:#e6edf3; --accent:#39FF14; --danger:#ff4444; }
        body{ margin:0; background:var(--bg); color:var(--text); font-family:'Roboto',sans-serif; }
        header{ text-align:center; padding:20px; background:linear-gradient(180deg,#FFA500,#111); border-radius:0 0 20px 20px; }
        header h1{ margin:0; font-family:'Orbitron',sans-serif; font-size:22px; color: #000; }
        .container{ max-width:800px; margin:auto; padding:15px; }
        .card{ background:var(--card); padding:20px; border-radius:15px; margin:15px 0; border:1px solid #30363d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2{ color:var(--primary); font-size:18px; margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;}
        input,select,textarea,button{ width:100%; padding:14px; margin:10px 0; border-radius:10px; border:none; font-size:14px; box-sizing:border-box; background: #0d1117; color: white; }
        button{ background:var(--primary); color:#000; font-weight:bold; cursor:pointer; }
        #mainApp { display: none; }
        .nav-links { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .nav-links a { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>ABDURHAMAN MECHATRONICS</h1>
    <p>AI-Powered Integrated Maintenance</p>
</header>

<div class="container">
    <div id="loginSection" class="card">
        <h2>🔐 Admin Access</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">SIGN IN</button>
    </div>

    <div id="mainApp">
        <div class="nav-links">
            <a href="dashboard/dashboard.html">📊 DASHBOARD</a>
            <a href="image-ai/upload.html">📸 AI SCANNER</a>
            <button onclick="logout()" style="width:auto; background:red; color:white; padding:5px 10px; margin:0;">LOGOUT</button>
        </div>

        <div class="card">
            <h2>🛠️ AI Machine Analysis</h2>
            <input type="file" id="imgFile" accept="image/*">
            <button onclick="runVisionAI()" style="background:var(--accent); color:#000;">ANALYZE WITH AI</button>
            <textarea id="issue" placeholder="AI Analysis result..."></textarea>
            <button onclick="saveReport()">SAVE TO CLOUD</button>
        </div>

        <div class="card">
            <h2>📈 Service Dashboard</h2>
            <div id="reportList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script type="module">
    import { analyzeImage } from './api/vision-ai.js';
    window.runVisionAI = async () => {
        const file = document.getElementById("imgFile").files[0];
        if(!file) return alert("Select an image!");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            document.getElementById("issue").value = "🔄 AI is analyzing...";
            try {
                const data = await analyzeImage(reader.result);
                document.getElementById("issue").value = data.choices[0].message.content;
            } catch (err) {
                document.getElementById("issue").value = "❌ API Error or Key Missing.";
            }
        };
    };
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1_0Ptpna4V-2cfyJHNwIvWvbA2eGLv18",
  authDomain: "sbm-app-ecf59.firebaseapp.com",
  projectId: "sbm-app-ecf59",
  storageBucket: "sbm-app-ecf59.firebasestorage.app",
  messagingSenderId: "666387083873",
  appId: "1:666387083873:web:bfd6d5e064ecaad6c73020"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
const db = firebase.firestore();

function login() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}
function logout() { auth.signOut(); }
auth.onAuthStateChanged(user => {
    document.getElementById("loginSection").style.display = user ? "none" : "block";
    document.getElementById("mainApp").style.display = user ? "block" : "none";
});

function saveReport(){
    const i = document.getElementById("issue").value;
    if(!i) return alert("No data");
    db.collection("reports").add({
        issue: i, status: "pending",
        time: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => alert("Saved!"));
}

db.collection("reports").orderBy("time", "desc").onSnapshot(snapshot => {
    const list = document.getElementById("reportList");
    list.innerHTML = "";
    snapshot.forEach(doc => {
        const d = doc.data();
        list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">
            <small>${d.time ? d.time.toDate().toLocaleString() : ''}</small><br>
            <span>${d.issue}</span>
        </div>`;
    });
});
</script>
</body>
</html>
